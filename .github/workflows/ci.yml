name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Floor (3.9 per pyproject.toml requires-python), a mid-rev, and latest.
        python: ['3.9', '3.11', '3.13']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: pip install -e '.[dev]'
      - run: pytest -q

  # ruff + mypy intentionally omitted for now: a clean pass requires a
  # one-time formatter run and a handful of typing fixes (~67 ruff findings
  # + 8 mypy errors as of this commit). Enable after that cleanup lands so
  # the signal stays meaningful.
